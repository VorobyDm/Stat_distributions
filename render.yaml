# Render Blueprint — auto-creates the backend service when you connect this repo.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: stat-lab-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ALLOWED_ORIGINS
        # Set this to your real domain in the Render dashboard after first deploy.
        value: https://ungservice.com,https://www.ungservice.com
